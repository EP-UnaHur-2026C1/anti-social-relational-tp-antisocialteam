openapi: 3.0.0
info:
  title: UnaHur Anti-Social Net API
  version: 1.0.0
  description: >
    API backend de la red social UnaHur Anti-Social Net. Permite gestionar
    usuarios, publicaciones, imágenes, comentarios y etiquetas.

servers:
  - url: http://localhost:3000
    description: Servidor local

tags:
  - name: Users
  - name: Posts
  - name: PostImages
  - name: Comments
  - name: Tags

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        nickName:
          type: string
        email:
          type: string
    UserInput:
      type: object
      required: [nickName, email, password]
      properties:
        nickName:
          type: string
        email:
          type: string
        password:
          type: string
    Post:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        userId:
          type: integer
        createdAt:
          type: string
          format: date-time
    PostInput:
      type: object
      required: [description, userId]
      properties:
        description:
          type: string
        userId:
          type: integer
        tags:
          type: array
          items:
            type: integer
        images:
          type: array
          items:
            type: string
    PostImage:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        postId:
          type: integer
    PostImageInput:
      type: object
      required: [url, postId]
      properties:
        url:
          type: string
        postId:
          type: integer
    Comment:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        userId:
          type: integer
        postId:
          type: integer
        createdAt:
          type: string
          format: date-time
    CommentInput:
      type: object
      required: [content, userId, postId]
      properties:
        content:
          type: string
        userId:
          type: integer
        postId:
          type: integer
    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    TagInput:
      type: object
      required: [name]
      properties:
        name:
          type: string

paths:
  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      responses:
        "200":
          description: Lista de usuarios
    post:
      tags: [Users]
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Usuario creado
        "400":
          description: Datos inválidos
        "409":
          description: nickName ya existente
  /users/{id}:
    get:
      tags: [Users]
      summary: Obtener usuario por id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usuario encontrado
        "404":
          description: Usuario no encontrado
    put:
      tags: [Users]
      summary: Actualizar usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Usuario actualizado
        "404":
          description: Usuario no encontrado
    delete:
      tags: [Users]
      summary: Eliminar usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Usuario eliminado
        "404":
          description: Usuario no encontrado

  /posts:
    get:
      tags: [Posts]
      summary: Listar posts
      responses:
        "200":
          description: Lista de posts con imágenes y etiquetas
    post:
      tags: [Posts]
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
        "400":
          description: Datos inválidos o usuario inexistente
  /posts/{id}:
    get:
      tags: [Posts]
      summary: Obtener post por id (incluye comentarios visibles)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
        "404":
          description: Post no encontrado
    put:
      tags: [Posts]
      summary: Actualizar descripción del post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
      responses:
        "200":
          description: Post actualizado
        "404":
          description: Post no encontrado
    delete:
      tags: [Posts]
      summary: Eliminar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post eliminado
        "404":
          description: Post no encontrado
  /posts/{id}/tags:
    post:
      tags: [Posts]
      summary: Asociar una etiqueta a un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagId]
              properties:
                tagId:
                  type: integer
      responses:
        "200":
          description: Etiqueta asociada
        "404":
          description: Post o etiqueta no encontrados
  /posts/{id}/tags/{tagId}:
    delete:
      tags: [Posts]
      summary: Quitar una etiqueta de un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Etiqueta desasociada
        "404":
          description: Post o etiqueta no encontrados

  /postimages:
    get:
      tags: [PostImages]
      summary: Listar imágenes
      responses:
        "200":
          description: Lista de imágenes
    post:
      tags: [PostImages]
      summary: Agregar imagen a un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostImageInput"
      responses:
        "201":
          description: Imagen creada
        "400":
          description: Datos inválidos o post inexistente
  /postimages/{id}:
    get:
      tags: [PostImages]
      summary: Obtener imagen por id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Imagen encontrada
        "404":
          description: Imagen no encontrada
    put:
      tags: [PostImages]
      summary: Actualizar URL de imagen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "200":
          description: Imagen actualizada
        "404":
          description: Imagen no encontrada
    delete:
      tags: [PostImages]
      summary: Eliminar imagen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Imagen eliminada
        "404":
          description: Imagen no encontrada

  /comments:
    get:
      tags: [Comments]
      summary: Listar comentarios
      responses:
        "200":
          description: Lista de comentarios
    post:
      tags: [Comments]
      summary: Crear comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comentario creado
        "400":
          description: Datos inválidos, post o usuario inexistente
  /comments/{id}:
    get:
      tags: [Comments]
      summary: Obtener comentario por id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comentario encontrado
        "404":
          description: Comentario no encontrado
    put:
      tags: [Comments]
      summary: Actualizar comentario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Comentario actualizado
        "404":
          description: Comentario no encontrado
    delete:
      tags: [Comments]
      summary: Eliminar comentario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Comentario eliminado
        "404":
          description: Comentario no encontrado

  /tags:
    get:
      tags: [Tags]
      summary: Listar etiquetas
      responses:
        "200":
          description: Lista de etiquetas
    post:
      tags: [Tags]
      summary: Crear etiqueta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Etiqueta creada
        "400":
          description: Datos inválidos
        "409":
          description: Nombre de etiqueta ya existente
  /tags/{id}:
    get:
      tags: [Tags]
      summary: Obtener etiqueta por id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Etiqueta encontrada
        "404":
          description: Etiqueta no encontrada
    put:
      tags: [Tags]
      summary: Actualizar etiqueta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "200":
          description: Etiqueta actualizada
        "404":
          description: Etiqueta no encontrada
    delete:
      tags: [Tags]
      summary: Eliminar etiqueta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Etiqueta eliminada
        "404":
          description: Etiqueta no encontrada
